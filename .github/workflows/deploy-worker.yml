name: deploy-worker

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - worker/**
      - package.json
      - pnpm-workspace.yaml
      - pnpm-lock.yaml
      - .github/workflows/deploy-worker.yml

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.22.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync Access secrets to Worker
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          INBOUND_URL: ${{ secrets.INBOUND_URL }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          printf "%s" "$INBOUND_URL" | pnpm exec wrangler secret put INBOUND_URL
          printf "%s" "$CF_ACCESS_CLIENT_ID" | pnpm exec wrangler secret put CF_ACCESS_CLIENT_ID
          printf "%s" "$CF_ACCESS_CLIENT_SECRET" | pnpm exec wrangler secret put CF_ACCESS_CLIENT_SECRET

      - name: Deploy worker
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec wrangler deploy
