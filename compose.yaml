services:
  mail-shell:
    image: ghcr.io/rhnu/mail-shell:latest
    expose:
      - "3000"
    environment:
      MAIL_SHELL_HOST: 0.0.0.0
      MAIL_SHELL_PORT: 3000
      MAIL_SHELL_DATA_DIR: /data
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped
